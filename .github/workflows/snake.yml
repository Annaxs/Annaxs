name: generate snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Annaxs
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#FF4FD8&color_dots=#0A0F1E,#2A2F45,#B8B8FF,#FF4FD8,#2EF9B6

      - uses: crazy-max/ghaction-github-pages@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          target_branch: output
          build_dir: dist
